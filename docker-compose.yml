services:
  thai-coffee:
    build: .
    container_name: thai-coffee-guide
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "8420:80"   # Keep direct port access for debugging
    networks:
      - swag-network
    labels:
      - "swag=enable"
      - "swag_address=thai-coffee-guide"
      - "swag_port=80"
      - "swag_url=thai-coffee.shellnode.lol"

networks:
  swag-network:
    external: true
